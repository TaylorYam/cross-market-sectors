<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="台美日港跨市場族群連動清單 — 從台股投資人視角看半導體與相關產業在四個市場的對應標的">
<title>台美日港 跨市場族群連動清單</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #1E2761;
    --primary-dark: #14193F;
    --primary-light: #3A4584;
    --bg: #F5F7FA;
    --card: #FFFFFF;
    --border: #E0E5EB;
    --text: #1F2937;
    --text-muted: #5A6B85;
    --tw: #2E7D32;
    --tw-bg: #E8F5E9;
    --us: #1565C0;
    --us-bg: #E3F2FD;
    --jp: #E65100;
    --jp-bg: #FFF3E0;
    --hk: #C62828;
    --hk-bg: #FFEBEE;
  }

  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, "Helvetica Neue", "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    font-size: 15px;
  }

  header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    padding: 24px 16px 28px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  header .wrap {
    max-width: 1100px;
    margin: 0 auto;
    position: relative;
  }
  header .byline {
    position: absolute;
    top: 0;
    right: 0;
    font-size: 12px;
    opacity: 0.75;
    letter-spacing: 0.06em;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  header .byline a {
    color: white;
    text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.4);
    padding-bottom: 1px;
    transition: opacity 0.15s, border-color 0.15s;
  }
  header .byline a:hover {
    opacity: 1;
    border-color: rgba(255,255,255,1);
  }
  header .byline .mono {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    background: rgba(255,255,255,0.15);
    color: white;
    border-radius: 50%;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0;
  }
  @media (max-width: 480px) {
    header .byline { font-size: 11px; }
    header .byline .mono { width: 20px; height: 20px; font-size: 10px; }
  }
  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  header p.subtitle {
    margin-top: 6px;
    font-size: 13px;
    opacity: 0.85;
    font-weight: 400;
  }
  header .stats {
    margin-top: 12px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 12px;
    opacity: 0.85;
  }
  header .stats span { white-space: nowrap; }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px;
  }

  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    align-items: center;
  }
  .filter-bar label { font-size: 13px; color: var(--text-muted); }
  .filter-bar input {
    flex: 1;
    min-width: 200px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    background: var(--card);
  }
  .filter-bar input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(30,39,97,0.1);
  }

  /* 大類區塊 */
  .big-cat {
    background: var(--card);
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    border: 1px solid var(--border);
  }
  .big-cat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    cursor: pointer;
    background: var(--card);
    user-select: none;
    transition: background 0.15s;
  }
  .big-cat-header:hover { background: #FAFBFD; }
  .big-cat-header h2 {
    font-size: 16px;
    color: var(--primary);
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .big-cat-header .arrow {
    width: 12px;
    height: 12px;
    border-right: 2px solid var(--primary);
    border-bottom: 2px solid var(--primary);
    transform: rotate(45deg);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .big-cat.open .big-cat-header .arrow {
    transform: rotate(-135deg);
  }
  .big-cat-header .count {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .big-cat-body {
    display: none;
    padding: 0 8px 12px;
  }
  .big-cat.open .big-cat-body { display: block; }

  /* 族群網格 */
  .sector-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }
  @media (min-width: 720px) {
    .sector-grid { grid-template-columns: 1fr 1fr; }
  }

  /* 族群卡片 */
  .sector {
    background: #FAFBFD;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .sector.open { background: #FFFFFF; }
  .sector-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .sector-header:hover { background: #F0F3F8; }
  .sector-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--primary);
    flex: 1;
    line-height: 1.3;
  }
  .sector-count {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: 8px;
    white-space: nowrap;
    background: white;
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 10px;
  }
  .sector.open .sector-count { background: var(--primary); color: white; border-color: var(--primary); }

  .sector-body {
    display: none;
    padding: 4px 14px 14px;
    background: white;
    border-top: 1px solid var(--border);
  }
  .sector.open .sector-body { display: block; }

  .sector-desc {
    font-size: 12px;
    color: var(--text-muted);
    margin: 8px 0 12px;
    line-height: 1.5;
  }

  /* 市場區塊 */
  .market {
    margin-bottom: 12px;
  }
  .market-label {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 12px;
    margin-bottom: 6px;
  }
  .market-label.tw { color: var(--tw); background: var(--tw-bg); }
  .market-label.us { color: var(--us); background: var(--us-bg); }
  .market-label.jp { color: var(--jp); background: var(--jp-bg); }
  .market-label.hk { color: var(--hk); background: var(--hk-bg); }

  .stocks {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stock {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 6px;
    background: #FAFBFD;
    font-size: 13.5px;
    line-height: 1.4;
  }
  .stock.tw { border-left: 3px solid var(--tw); }
  .stock.us { border-left: 3px solid var(--us); }
  .stock.jp { border-left: 3px solid var(--jp); }
  .stock.hk { border-left: 3px solid var(--hk); }
  .stock-code {
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    font-weight: 600;
    color: var(--primary);
    flex-shrink: 0;
    font-size: 12.5px;
  }
  .stock-name {
    color: var(--text);
    word-break: break-word;
  }
  .stock-supp {
    display: inline-block;
    font-size: 10px;
    background: #FFF8E1;
    color: #F57C00;
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: 2px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .stock-ann {
    color: var(--text-muted);
    font-size: 11px;
    margin-left: 2px;
  }

  .empty-market {
    color: var(--text-muted);
    font-size: 12px;
    font-style: italic;
    padding: 4px 0;
  }

  footer {
    text-align: center;
    padding: 24px 16px 32px;
    font-size: 12px;
    color: var(--text-muted);
  }
  footer p { margin: 4px 0; }
  footer .disclaimer {
    color: #B71C1C;
    font-weight: 600;
  }

  /* 控制列 */
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .controls button {
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: white;
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .controls button:hover {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }

  /* 隱藏無結果 */
  .hidden { display: none !important; }

  /* 高亮搜尋字 */
  mark {
    background: #FFE082;
    color: var(--text);
    padding: 0 2px;
    border-radius: 2px;
  }
</style>
</head>

const MARKET_LABELS = {
  tw: { label: '台股', cls: 'tw' },
  us: { label: '美股', cls: 'us' },
  jp: { label: '日股', cls: 'jp' },
  hk: { label: '港股+中國A股', cls: 'hk' }
};

function renderStock(s, marketCls) {
  return `<div class="stock ${marketCls}" data-search="${(s.code + ' ' + s.name).toLowerCase()}">
    <span class="stock-code">${escapeHTML(s.code)}</span>
    <span class="stock-name">${escapeHTML(s.name)}</span>
  </div>`;
}

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}

function renderMarket(stocks, key) {
  const m = MARKET_LABELS[key];
  if (!stocks || stocks.length === 0) {
    return `<div class="market">
      <span class="market-label ${m.cls}">${m.label}</span>
      <div class="empty-market">—</div>
    </div>`;
  }
  return `<div class="market">
    <span class="market-label ${m.cls}">${m.label} (${stocks.length})</span>
    <div class="stocks">${stocks.map(s => renderStock(s, m.cls)).join('')}</div>
  </div>`;
}

function renderSector(sec) {
  return `<div class="sector" data-name="${escapeHTML(sec.name)}">
    <div class="sector-header" onclick="this.parentNode.classList.toggle('open')">
      <span class="sector-name">${escapeHTML(sec.name)}</span>
      <span class="sector-count">${sec.total}</span>
    </div>
    <div class="sector-body">
      ${sec.desc ? `<div class="sector-desc">${escapeHTML(sec.desc)}</div>` : ''}
      ${renderMarket(sec.tw, 'tw')}
      ${renderMarket(sec.us, 'us')}
      ${renderMarket(sec.jp, 'jp')}
      ${renderMarket(sec.hk, 'hk')}
    </div>
  </div>`;
}

function renderBigCat(bc, idx) {
  const sectorTotal = bc.sectors.reduce((sum, s) => sum + (s.total || 0), 0);
  const opened = idx === 0 ? 'open' : '';
  return `<div class="big-cat ${opened}">
    <div class="big-cat-header" onclick="this.parentNode.classList.toggle('open')">
      <h2><span class="arrow"></span>${escapeHTML(bc.big)}</h2>
      <span class="count">${bc.sectors.length} 族群 · ${sectorTotal} 檔</span>
    </div>
    <div class="big-cat-body">
      <div class="sector-grid">
        ${bc.sectors.map(renderSector).join('')}
      </div>
    </div>
  </div>`;
}

// 初始化
document.getElementById('categories').innerHTML = DATA.map(renderBigCat).join('');

// 統計
let totalSectors = 0, totalStocks = 0;
const marketTotals = { tw: 0, us: 0, jp: 0, hk: 0 };
DATA.forEach(bc => bc.sectors.forEach(s => {
  totalSectors++;
  totalStocks += s.total;
  marketTotals.tw += (s.tw || []).length;
  marketTotals.us += (s.us || []).length;
  marketTotals.jp += (s.jp || []).length;
  marketTotals.hk += (s.hk || []).length;
}));
document.getElementById('stats').innerHTML = `
  <span>${DATA.length} 大類</span>
  <span>${totalSectors} 族群</span>
  <span>台 ${marketTotals.tw}</span>
  <span>美 ${marketTotals.us}</span>
  <span>日 ${marketTotals.jp}</span>
  <span>港+A ${marketTotals.hk}</span>
`;

// 搜尋
const searchInput = document.getElementById('search');
let searchTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => doSearch(searchInput.value.trim().toLowerCase()), 150);
});

function doSearch(q) {
  const sectors = document.querySelectorAll('.sector');
  const bigCats = document.querySelectorAll('.big-cat');
  if (!q) {
    sectors.forEach(s => s.classList.remove('hidden', 'open'));
    bigCats.forEach((bc, i) => {
      bc.classList.remove('hidden');
      bc.classList.toggle('open', i === 0);
    });
    return;
  }
  bigCats.forEach(bc => {
    let anyVisible = false;
    bc.querySelectorAll('.sector').forEach(sec => {
      const stocks = sec.querySelectorAll('.stock');
      const sectorName = sec.dataset.name.toLowerCase();
      const inName = sectorName.includes(q);
      let inStock = false;
      stocks.forEach(st => {
        if (st.dataset.search.includes(q)) inStock = true;
      });
      const show = inName || inStock;
      sec.classList.toggle('hidden', !show);
      if (show) {
        sec.classList.add('open');
        anyVisible = true;
      }
    });
    bc.classList.toggle('hidden', !anyVisible);
    if (anyVisible) bc.classList.add('open');
  });
}

// 全部展開 / 收合
document.getElementById('expandAll').addEventListener('click', () => {
  document.querySelectorAll('.big-cat, .sector').forEach(e => e.classList.add('open'));
});
document.getElementById('collapseAll').addEventListener('click', () => {
  document.querySelectorAll('.big-cat, .sector').forEach(e => e.classList.remove('open'));
});
